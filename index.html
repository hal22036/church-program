<!doctype html>

<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Discovery Park Ward Program</title>

  <style>
    body {
      margin: 0;
      font-family: system-ui, Arial, sans-serif;
      background: #fff;
    }

    .wrap {
      max-width: 900px;
      margin: 0 auto;
      padding: 4px;
    }

    img {
      width: 100%;
      height: auto;
      display: block;
      margin: 20px 0;
      border-radius: 8px;
    }

    .song-links {
      display: grid;
      gap: 10px;
      margin: 10px 0 20px;
    }

    .song-links a {
      display: block;
      padding: 14px;
      text-align: center;
      border: 1px solid #ccc;
      border-radius: 8px;
      text-decoration: none;
      color: #000;
      font-weight: 600;
      background: #f7f7f7;
    }

    .song-links a:hover {
      background: #eeeeee;
    }
  </style>

</head>

<body>
  <div class="wrap" id="program"></div>

  <script>

    // CHANGE THIS ONE LINE EACH WEEK
    const version = "0712";

    // CHANGE HYMN NAMES EACH WEEK
    const hymns = [
  {
    title: "Opening Hymn",
    hymn: "Do What Is Right",
    slug: "do-what-is-right"
  },
  {
    title: "Sacrament Hymn",
    hymn: "Upon The Cross of Calvary",
    slug: "upon-the-cross-of-calvary"
  },
  {
  title: "Intermediate Hymn",
  hymn: "Elijah and the Still, Small Voice",
  url: "https://www.churchofjesuschrist.org/media/music/songs/elijah-and-the-still-small-voice?lang=eng"
},
  {
    title: "Closing Hymn",
    hymn: "Know This, That Every Soul Is Free",
    slug: "know-this-that-every-soul-is-free"
  }
];

    const images = [
      "page_front@2x-100.jpg",
      "page_program@2x-100.jpg",
      "page_announcements@2x-100.jpg",
      "page_calendar@2x-100.jpg",
      "page_information@2x-100.jpg"
    ];

    const container = document.getElementById("program");

    images.forEach((file, index) => {

      if (file === "page_program@2x-100.jpg") {

        const songDiv = document.createElement("div");
        songDiv.className = "song-links";

        hymns.forEach(hymn => {

          const link = document.createElement("a");

          const searchTerm = encodeURIComponent(hymn.hymn);

          if (hymn.url) {
  link.href = hymn.url;
} else {
  link.href = `https://www.churchofjesuschrist.org/study/manual/hymns/${hymn.slug}?lang=eng`;
}

          link.target = "_blank";
          link.rel = "noopener";

          link.textContent = `${hymn.title}: ${hymn.hymn}`;

          songDiv.appendChild(link);
        });

        container.appendChild(songDiv);
      }

      const img = document.createElement("img");

      img.src = `${file}?v=${version}`;

      img.alt = `Program page ${index + 1}`;

      container.appendChild(img);
    });

  </script>

</body>
</html>
