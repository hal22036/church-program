<!doctype html>

<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Discovery Park Ward Program</title>

  <style>
    body {
      margin: 0;
      font-family: system-ui, Arial, sans-serif;
      background: #fff;
    }

    .wrap {
      max-width: 900px;
      margin: 0 auto;
      padding: 4px;
    }

    img {
      width: 100%;
      height: auto;
      display: block;
      margin: 20px 0;
      border-radius: 8px;
    }

    .song-links {
      display: grid;
      gap: 10px;
      margin: 10px 0 20px;
    }

    .song-links a {
      display: block;
      padding: 14px;
      text-align: center;
      border: 1px solid #ccc;
      border-radius: 8px;
      text-decoration: none;
      color: #000;
      font-weight: 600;
      background: #f7f7f7;
    }

    .song-links a:hover {
      background: #eeeeee;
    }
  </style>
</head>

<body>
  <div class="wrap" id="program"></div>

  <script>
    // CHANGE THIS ONE LINE EACH WEEK
    const version = "0726";

    /*
      HYMN TYPES

      "classic"
      Standard hymnbook:
      /study/manual/hymns/

      "home"
      Hymns—For Home and Church:
      /study/music/hymns-for-home-and-church/

      "primary"
      Primary and children's songs:
      /media/music/songs/

      You may also use:
      url: "https://full-link-here"

      A full URL overrides the type and slug.
    */

    // CHANGE HYMN NAMES EACH WEEK
    const hymns = [
      {
        title: "Opening Hymn",
        hymn: "O Thou Rock of Our Salvation",
        slug: "o-thou-rock-of-our-salvation",
        type: "classic"
      },
      {
        title: "Sacrament Hymn",
        hymn: "Bread of Life, Living Water",
        slug: "bread-of-life-living-water",
        type: "home"
      },

      /*
      {
        title: "Primary Musical Number",
        hymn: "Elijah and the Still, Small Voice",
        slug: "elijah-and-the-still-small-voice",
        type: "primary"
      },
      */

      {
        title: "Closing Hymn",
        hymn: "It Is Well With My Soul",
        slug: "it-is-well-with-my-soul",
        type: "home"
      }
    ];

    const images = [
      "page_front@2x-100.jpg",
      "page_program@2x-100.jpg",
      "page_announcements@2x-100.jpg",
      "page_calendar@2x-100.jpg",
      "page_information@2x-100.jpg"
    ];

    const container = document.getElementById("program");

    function getHymnUrl(hymn) {
      if (hymn.url) {
        return hymn.url;
      }

      if (hymn.type === "home") {
        return `https://www.churchofjesuschrist.org/study/music/hymns-for-home-and-church/${hymn.slug}?lang=eng`;
      }

      if (hymn.type === "primary") {
        return `https://www.churchofjesuschrist.org/media/music/songs/${hymn.slug}?lang=eng`;
      }

      return `https://www.churchofjesuschrist.org/study/manual/hymns/${hymn.slug}?lang=eng`;
    }

    images.forEach((file, index) => {
      if (file === "page_program@2x-100.jpg") {
        const songDiv = document.createElement("div");
        songDiv.className = "song-links";

        hymns.forEach((hymn) => {
          const link = document.createElement("a");

          link.href = getHymnUrl(hymn);
          link.target = "_blank";
          link.rel = "noopener noreferrer";
          link.textContent = `${hymn.title}: ${hymn.hymn}`;

          songDiv.appendChild(link);
        });

        container.appendChild(songDiv);
      }

      const img = document.createElement("img");

      img.src = `${file}?v=${version}`;
      img.alt = `Program page ${index + 1}`;

      container.appendChild(img);
    });
  </script>
</body>
</html>
